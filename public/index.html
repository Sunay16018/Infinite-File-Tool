<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVibe Studio v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: #d1d5db; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #30363d; }
        .sidebar { background: #0d1117; border-right: 1px solid #30363d; }
        #previewFrame { background: white; width: 100%; height: 100%; border: none; }
        .step-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 11px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 glass flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-cyan-500 italic tracking-tighter">OMNIVIBE STUDIO</h1>
            <div id="status" class="px-3 py-1 bg-cyan-500/10 text-cyan-500 text-[10px] rounded-full border border-cyan-500/20 font-bold uppercase tracking-widest">Sistem Hazır</div>
        </div>
        <div class="flex gap-3">
            <button onclick="togglePreview()" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold transition-all border border-slate-700">TAM EKRAN GÖZ AT 🖥️</button>
            <button onclick="downloadZip()" class="px-5 py-2 bg-cyan-600 hover:bg-cyan-500 text-black rounded-xl text-xs font-bold transition-all shadow-lg shadow-cyan-500/20">PROJEYİ İNDİR (.ZIP)</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div class="w-3/5 flex flex-col sidebar p-6 space-y-4">
            <div class="flex-1 flex flex-col space-y-4 overflow-hidden">
                <div id="steps" class="flex-1 overflow-y-auto pr-2">
                    <div class="step-card text-slate-500">Kanka selam! Ne kodlamak istersin? vibe'ını yaz, gerisini bana bırak.</div>
                </div>
                
                <div class="relative group">
                    <textarea id="userInput" 
                        class="w-full bg-[#0d1117] border-2 border-slate-800 rounded-2xl p-5 text-sm focus:border-cyan-500 focus:ring-4 focus:ring-cyan-500/10 outline-none transition-all resize-none shadow-2xl" 
                        rows="6" 
                        placeholder="Örn: 'Bana profesyonel bir Discord botu kodla, config dosyası olsun ve komutlar klasörde toplansın...'"></textarea>
                    <button onclick="sendVibe()" id="sendBtn" 
                        class="absolute bottom-4 right-4 px-8 py-3 bg-cyan-500 text-black font-black rounded-xl hover:scale-105 active:scale-95 transition-all shadow-xl">
                        KODLA ⚡
                    </button>
                </div>
            </div>
        </div>

        <div class="w-2/5 bg-[#010409] flex flex-col">
            <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-black/20">
                <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">CANLI KOD AKIŞI</span>
                <div class="flex gap-1">
                    <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                    <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                    <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
                </div>
            </div>
            <pre id="codeView" class="flex-1 overflow-auto p-6 text-[11px] text-cyan-400/70 leading-relaxed font-mono"></pre>
        </div>
    </main>

    <div id="fullPreview" class="fixed inset-0 bg-[#0d1117] z-50 hidden flex flex-col">
        <div class="p-4 flex justify-between items-center glass">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-sm font-bold text-slate-300">CANLI ÖNİZLEME MODU</span>
            </div>
            <button onclick="togglePreview()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/20 px-6 py-2 rounded-xl text-xs font-bold transition-all">KAPAT</button>
        </div>
        <div class="flex-1 p-4">
            <iframe id="previewFrame" class="shadow-2xl border border-slate-800 rounded-2xl"></iframe>
        </div>
    </div>

    <script>
        let projectFiles = {};
        let chatHistory = [];

        async function sendVibe() {
            const input = document.getElementById('userInput').value;
            if(!input) return;

            const steps = document.getElementById('steps');
            const status = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            const codeView = document.getElementById('codeView');

            status.innerText = "AI KODLUYOR...";
            status.classList.add('animate-pulse');
            btn.disabled = true;
            steps.innerHTML += `<div class="step-card border-l-4 border-l-cyan-500">🚀 <b>Talimat:</b> ${input}</div>`;
            steps.scrollTop = steps.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input, history: chatHistory })
                });
                const data = await response.json();

                if(data.success) {
                    codeView.innerText = data.aiResponse;
                    parseAIResponse(data.aiResponse);
                    chatHistory.push({ role: "user", content: input });
                    chatHistory.push({ role: "assistant", content: data.aiResponse });
                }
            } catch (err) {
                steps.innerHTML += `<div class="step-card border-l-4 border-l-red-500 text-red-400">❌ Hata: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                status.innerText = "TAMAMLANDI";
                status.classList.remove('animate-pulse');
                document.getElementById('userInput').value = "";
            }
        }

        function parseAIResponse(text) {
            const fileRegex = /\[FILE: (.*?)\]([\s\S]*?)\[END_FILE\]/g;
            let match;
            const steps = document.getElementById('steps');

            while ((match = fileRegex.exec(text)) !== null) {
                const fileName = match[1].trim();
                const fileContent = match[2].trim();
                projectFiles[fileName] = fileContent;
                steps.innerHTML += `<div class="step-card border-l-4 border-l-emerald-500">📂 <b>Dosya Güncellendi:</b> ${fileName}</div>`;
            }
            steps.scrollTop = steps.scrollHeight;
            updatePreview();
        }

        function updatePreview() {
            const frame = document.getElementById('previewFrame');
            const htmlContent = projectFiles['index.html'] || `<html><body style="background:#0d1117;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;"><div><h2 style="color:#22d3ee">Önizleme Hazır</h2><p>index.html oluşturulduğunda burada görünecek.</p></div></body></html>`;
            frame.srcdoc = htmlContent;
        }

        function togglePreview() {
            document.getElementById('fullPreview').classList.toggle('hidden');
        }

        async function downloadZip() {
            const zip = new JSZip();
            for(let name in projectFiles) {
                zip.file(name, projectFiles[name]);
            }
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "vibe_proje_paketi.zip";
            a.click();
        }
    </script>
</body>
</html>
