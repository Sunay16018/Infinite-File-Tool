<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniParse AI Pro - Vision & PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .glass { background: #0f172a; border: 1px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-grad { background: linear-gradient(90deg, #06b6d4, #3b82f6); transition: 0.3s; }
        .btn-grad:hover { opacity: 0.85; transform: translateY(-2px); }
        
        /* AI'dan gelen resimlerin kutudan taşmaması ve şık durması için */
        #resTxt img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0; 
            border: 2px solid #334155;
            display: block;
        }
        /* Kaydırma çubuğu tasarımı */
        #resTxt::-webkit-scrollbar { width: 6px; }
        #resTxt::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-3xl w-full glass p-8 rounded-[2rem]">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">OMNIPARSE PRO</h1>
            <p class="text-slate-500 text-xs mt-2 tracking-widest uppercase font-bold">Resimli PDF • Görsel Analiz • Kod • 1M Token</p>
        </div>

        <div class="space-y-6">
            <div class="relative border-2 border-dashed border-slate-700 rounded-3xl p-10 text-center hover:border-cyan-500 transition-all bg-slate-900/30 cursor-pointer" onclick="document.getElementById('fileInp').click()">
                <input type="file" id="fileInp" class="hidden" onchange="document.getElementById('fname').innerText = this.files[0].name">
                <p id="fname" class="text-slate-400 font-medium">Görsel, PDF veya Kod Dosyası Yükle</p>
                <p class="text-slate-600 text-xs mt-1">Sürükle bırak veya tıkla</p>
            </div>

            <textarea id="task" rows="4" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 outline-none focus:ring-2 focus:ring-cyan-500 text-sm" placeholder="Örn: Bu görseldeki soruyu çöz veya Dünyanın en zenginlerini resimli anlat..."></textarea>

            <button onclick="process()" id="mainBtn" class="w-full btn-grad py-5 rounded-2xl font-black text-lg shadow-lg">İŞLEMİ BAŞLAT 🚀</button>

            <div id="loader" class="hidden text-center">
                <div class="inline-block animate-spin w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full"></div>
                <p class="text-cyan-500 text-xs mt-2 font-bold animate-pulse">AI ANALİZ EDİYOR...</p>
            </div>

            <div id="resBox" class="hidden space-y-4">
                <div class="flex flex-wrap gap-2 items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                    <span class="text-cyan-400 text-xs font-bold uppercase tracking-widest">Çıktı Araçları:</span>
                    <div class="flex gap-2">
                        <button onclick="downloadPDF()" class="bg-rose-600 hover:bg-rose-700 px-4 py-2 rounded-xl text-xs font-bold transition-all">Resimli PDF İndir</button>
                        <button onclick="downloadTxt()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-xs font-bold transition-all">Metin Al</button>
                        <button onclick="copyRes()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-xs font-bold transition-all">Kopyala</button>
                    </div>
                </div>
                <div id="resTxt" class="bg-black/40 border border-slate-800 p-6 rounded-2xl text-slate-300 text-sm leading-relaxed max-h-[500px] overflow-auto shadow-inner"></div>
            </div>
        </div>
    </div>

    <script>
        async function process() {
            const f = document.getElementById('fileInp').files[0];
            const t = document.getElementById('task').value;
            if(!f || !t) return alert("Dosya seç ve talimat yaz kanka!");

            const btn = document.getElementById('mainBtn'), loader = document.getElementById('loader'), box = document.getElementById('resBox'), txt = document.getElementById('resTxt');
            btn.classList.add('hidden'); loader.classList.remove('hidden'); box.classList.add('hidden');

            const fd = new FormData(); fd.append('file', f); fd.append('task', t);
            try {
                const r = await fetch('/api/upload', { method: 'POST', body: fd });
                const d = await r.json();
                if(d.success) { 
                    // d.result içindeki satır sonlarını <br> yaparak HTML içine basıyoruz
                    txt.innerHTML = d.result.replace(/\n/g, '<br>'); 
                    box.classList.remove('hidden'); 
                }
                else alert("Hata: " + d.message);
            } catch { alert("Bağlantı hatası oluştu!"); }
            finally { btn.classList.remove('hidden'); loader.classList.add('hidden'); }
        }

        // GÖRSEL VE TABLOLARI KORUYARAK PDF YAPMA FONKSİYONU
        function downloadPDF() {
            const element = document.getElementById('resTxt');
            const opt = {
                margin:       [0.5, 0.5],
                filename:     'OmniParse_Rapor.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // html2pdf kütüphanesini kullanarak indiriyoruz
            html2pdf().set(opt).from(element).save();
        }

        function downloadTxt() {
            const blob = new Blob([document.getElementById('resTxt').innerText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'OmniParse_Output.txt';
            a.click();
        }

        function copyRes() {
            navigator.clipboard.writeText(document.getElementById('resTxt').innerText);
            alert("Kopyalandı kanka!");
        }
    </script>
</body>
</html>
