<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVibe Studio - Pro</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js](https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap](https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap)" rel="stylesheet">
    <style>
        body { background: #09090b; color: #f4f4f5; font-family: 'Fira Code', monospace; height: 100vh; overflow: hidden; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid #27272a; }
        .step-card { background: #18181b; border: 1px solid #27272a; border-radius: 6px; padding: 12px; margin-bottom: 8px; font-size: 12px; }
        #codeView { white-space: pre-wrap; word-wrap: break-word; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-4 glass flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-emerald-400 tracking-tighter">OMNIVIBE STUDIO</h1>
            <span id="status" class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] rounded border border-emerald-500/20 font-bold uppercase">SİSTEM HAZIR</span>
        </div>
        <div class="flex gap-3">
            <button onclick="togglePreview()" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded text-xs font-bold border border-zinc-700 transition-colors">🌐 CANLI ÖNİZLEME</button>
            <button onclick="downloadZip()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-black rounded text-xs font-black shadow-lg shadow-emerald-900/50 transition-colors">📦 PROJEYİ İNDİR (.ZIP)</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="w-1/2 flex flex-col border-r border-zinc-800 bg-[#09090b] p-4 gap-4">
            <div id="steps" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2">
                <div class="step-card border-l-4 border-l-blue-500 text-zinc-400">
                    ⚡ Kanka hoş geldin. Ne tür bir proje kodluyoruz? Yaz ve arkana yaslan.
                </div>
            </div>
            
            <div class="relative mt-auto shrink-0">
                <textarea id="userInput" 
                    class="w-full bg-[#18181b] border border-zinc-700 rounded-lg p-4 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none resize-none" 
                    rows="4" 
                    placeholder="Örn: HTML, CSS ve JS kullanarak şık bir hesap makinesi yap..."></textarea>
                <button onclick="sendVibe()" id="sendBtn" 
                    class="absolute bottom-3 right-3 px-6 py-2 bg-emerald-500 text-black font-black rounded hover:bg-emerald-400 transition-all">
                    KODLA 🚀
                </button>
            </div>
        </div>

        <div class="w-1/2 bg-[#000000] flex flex-col">
            <div class="p-2 border-b border-zinc-800 bg-[#18181b] flex justify-between items-center">
                <span class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold ml-2">Ham Kod Çıktısı</span>
            </div>
            <pre id="codeView" class="flex-1 overflow-y-auto p-4 text-[12px] text-emerald-400/80 leading-relaxed"></pre>
        </div>
    </main>

    <div id="fullPreview" class="fixed inset-0 bg-[#09090b] z-50 hidden flex flex-col">
        <div class="p-4 glass flex justify-between items-center">
            <span class="text-sm font-bold text-emerald-400">🌐 BROWSER ÖNİZLEMESİ</span>
            <button onclick="togglePreview()" class="text-white bg-red-600 hover:bg-red-500 px-6 py-2 rounded text-xs font-bold">KAPAT</button>
        </div>
        <div class="flex-1 bg-white">
            <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        let projectFiles = {};
        let chatHistory = [];

        async function sendVibe() {
            const input = document.getElementById('userInput').value;
            if(!input.trim()) return;

            const steps = document.getElementById('steps');
            const status = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            const codeView = document.getElementById('codeView');

            // UI Güncellemesi
            status.innerText = "YAPAY ZEKA KODLUYOR...";
            status.className = "px-3 py-1 bg-blue-500/10 text-blue-400 text-[10px] rounded border border-blue-500/20 font-bold uppercase animate-pulse";
            btn.disabled = true;
            btn.innerText = "BEKLE ⏳";
            
            steps.innerHTML += `<div class="step-card border-l-4 border-l-zinc-500 text-zinc-300"><b>Sen:</b> ${input}</div>`;
            steps.scrollTop = steps.scrollHeight;
            codeView.innerText = "Kodlar bekleniyor...\n(Büyük projeler 10-20 saniye sürebilir)";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input, history: chatHistory })
                });
                
                const data = await response.json();

                if(data.success) {
                    // Ham kodu sağ ekrana bas
                    codeView.innerText = data.aiResponse;
                    
                    // Dosyaları ayıkla
                    parseAIResponse(data.aiResponse);
                    
                    chatHistory.push({ role: "user", content: input });
                    chatHistory.push({ role: "assistant", content: data.aiResponse });
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                steps.innerHTML += `<div class="step-card border-l-4 border-l-red-500 text-red-400">❌ Hata: ${err.message}</div>`;
                codeView.innerText = "Bir hata oluştu kanka. Lütfen tekrar dene.";
            } finally {
                btn.disabled = false;
                btn.innerText = "KODLA 🚀";
                status.innerText = "PROJE HAZIR";
                status.className = "px-3 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] rounded border border-emerald-500/20 font-bold uppercase";
                document.getElementById('userInput').value = "";
                steps.scrollTop = steps.scrollHeight;
            }
        }

        function parseAIResponse(text) {
            const steps = document.getElementById('steps');
            projectFiles = {}; // Eski projeyi temizle
            
            // KURŞUNGEÇİRMEZ FİLTRE: Gemini inat edip markdown (```) atarsa onları siler
            let cleanText = text.replace(/```[a-z]*\n/gi, '').replace(/```/g, '');
            
            // Dosyaları bulan Regex (Boşluklara ve hatalara karşı esnek)
            const fileRegex = /\[FILE:\s*(.+?)\]([\s\S]*?)\[END_FILE\]/gi;
            let match;
            let foundFiles = 0;

            while ((match = fileRegex.exec(cleanText)) !== null) {
                const fileName = match[1].trim();
                const fileContent = match[2].trim();
                projectFiles[fileName] = fileContent;
                foundFiles++;
                steps.innerHTML += `<div class="step-card border-l-4 border-l-emerald-500 text-emerald-400">✅ <b>${fileName}</b> başarıyla oluşturuldu!</div>`;
            }

            if (foundFiles === 0) {
                steps.innerHTML += `<div class="step-card border-l-4 border-l-yellow-500 text-yellow-500">⚠️ Dosya formatı tam algılanamadı ama kodlar sağ tarafa yazdırıldı. Oradan kopyalayabilirsin.</div>`;
            }

            steps.scrollTop = steps.scrollHeight;
            updatePreview();
        }

        function updatePreview() {
            const frame = document.getElementById('previewFrame');
            // Eğer HTML varsa önizlemeye bas, yoksa uyarı göster
            if (projectFiles['index.html']) {
                frame.srcdoc = projectFiles['index.html'];
            } else {
                frame.srcdoc = `<html style="background:#18181b;color:#a1a1aa;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;"><h2>Sadece index.html dosyaları önizlenebilir. Python/Bot projelerini ZIP olarak indirin.</h2></html>`;
            }
        }

        function togglePreview() {
            document.getElementById('fullPreview').classList.toggle('hidden');
        }

        async function downloadZip() {
            if (Object.keys(projectFiles).length === 0) {
                return alert("İndirilecek dosya yok kanka! Önce bir proje oluştur.");
            }
            
            const zip = new JSZip();
            for(let name in projectFiles) {
                zip.file(name, projectFiles[name]);
            }
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "OmniVibe_Proje.zip";
            a.click();
        }
    </script>
</body>
</html>
