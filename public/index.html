<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniParse Ultra - Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Tailwind yüklenmezse bile sitenin tamamen dağılmasını önleyen yedek stiller */
        body { background-color: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-container { background: #0f172a; padding: 2rem; border-radius: 20px; border: 1px solid #1e293b; max-width: 500px; width: 90%; text-align: center; }
        textarea { width: 100%; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 10px; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: linear-gradient(90deg, #06b6d4, #3b82f6); color: white; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 style="color: #22d3ee; margin-bottom: 5px;">OMNIPARSE ULTRA</h1>
        <p style="font-size: 10px; color: #64748b; margin-bottom: 20px;">GÖRSEL ANALİZ & PDF RAPOR</p>
        
        <div style="border: 2px dashed #334155; padding: 20px; border-radius: 15px; cursor: pointer;" onclick="document.getElementById('fileInp').click()">
            <input type="file" id="fileInp" style="display: none;" onchange="document.getElementById('fname').innerText = this.files[0].name">
            <span id="fname" style="color: #94a3b8;">Dosya Seç veya Buraya Sürükle</span>
        </div>

        <textarea id="task" rows="4" placeholder="Ne yapmamı istersin kanka?"></textarea>

        <button onclick="process()" id="mainBtn" class="btn-primary">İŞLEMİ BAŞLAT 🚀</button>

        <div id="resBox" style="display: none; margin-top: 20px;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button onclick="downloadAs('pdf')" style="background: #e11d48; color: white;">PDF İNDİR</button>
                <button onclick="downloadAs('txt')" style="background: #475569; color: white;">TEXT AL</button>
            </div>
            <div id="resTxt" style="background: #000; padding: 15px; border-radius: 10px; text-align: left; max-height: 300px; overflow-y: auto; font-size: 14px;"></div>
        </div>
    </div>

    <script>
        async function process() {
            const f = document.getElementById('fileInp').files[0];
            const t = document.getElementById('task').value;
            if(!t) return alert("Talimat yaz kanka!");

            const btn = document.getElementById('mainBtn'), box = document.getElementById('resBox'), txt = document.getElementById('resTxt');
            btn.innerText = "İŞLENİYOR...";

            const fd = new FormData(); if(f) fd.append('file', f); fd.append('task', t);
            try {
                const r = await fetch('/api/upload', { method: 'POST', body: fd });
                const d = await r.json();
                if(d.success) { 
                    let cleanResult = d.result.replace(/```html|```/gi, '').trim();
                    if (f && f.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            txt.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-bottom:10px;">` + cleanResult.replace(/\n/g, '<br>');
                        };
                        reader.readAsDataURL(f);
                    } else {
                        txt.innerHTML = cleanResult.replace(/\n/g, '<br>');
                    }
                    box.style.display = 'block'; 
                }
            } catch { alert("Hata oluştu!"); }
            finally { btn.innerText = "İŞLEMİ BAŞLAT 🚀"; }
        }

        function downloadAs(ext) {
            if(ext === 'pdf') {
                const opt = { margin: 0.5, filename: 'rapor.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } };
                html2pdf().set(opt).from(document.getElementById('resTxt')).save();
            } else {
                const blob = new Blob([document.getElementById('resTxt').innerText], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `cikti.${ext}`;
                a.click();
            }
        }
    </script>
</body>
</html>
