<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVibe Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #previewFrame { background: white; width: 100%; height: 100%; border: none; border-radius: 12px; }
        .step-active { color: #22d3ee; border-left: 2px solid #22d3ee; padding-left: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 glass flex justify-between items-center border-b border-white/10">
        <h1 class="text-xl font-black tracking-tighter text-cyan-400 italic">OMNIVIBE STUDIO</h1>
        <div class="flex gap-2">
            <button onclick="togglePreview()" class="px-4 py-2 bg-blue-600 rounded-lg text-xs font-bold uppercase">Önizleme (Tam Ekran)</button>
            <button onclick="downloadZip()" class="px-4 py-2 bg-emerald-600 rounded-lg text-xs font-bold uppercase">ZIP İndir</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div class="w-1/3 flex flex-col border-r border-white/10 p-4 space-y-4">
            <div id="status" class="text-[10px] text-slate-500 uppercase font-bold">Durum: Bekleniyor...</div>
            <div id="steps" class="flex-1 overflow-auto space-y-2 text-sm text-slate-400">
                </div>
            <div class="flex flex-col gap-2">
                <textarea id="userInput" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none" rows="3" placeholder="Ne kodlayalım kanka? (Örn: Bir Todo App yap)"></textarea>
                <button onclick="sendVibe()" id="sendBtn" class="w-full py-3 bg-cyan-500 text-black font-black rounded-xl hover:bg-cyan-400 transition-all uppercase tracking-widest">KODLA ⚡</button>
            </div>
        </div>

        <div class="w-2/3 p-4 bg-slate-950 relative">
            <div id="editorLabel" class="absolute top-6 left-8 text-[10px] text-cyan-500/50">EDITOR_PREVIEW</div>
            <pre id="codeView" class="w-full h-full overflow-auto p-6 text-xs text-cyan-300/80 leading-relaxed"></pre>
        </div>
    </main>

    <div id="fullPreview" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="p-4 flex justify-between bg-slate-900">
            <span class="text-cyan-400 font-bold">CANLI ÖNİZLEME</span>
            <button onclick="togglePreview()" class="text-white bg-red-500 px-4 py-1 rounded">Kapat</button>
        </div>
        <iframe id="previewFrame"></iframe>
    </div>

    <script>
        let projectFiles = {};
        let chatHistory = [];

        async function sendVibe() {
            const input = document.getElementById('userInput').value;
            if(!input) return;

            const steps = document.getElementById('steps');
            const status = document.getElementById('status');
            const btn = document.getElementById('sendBtn');

            status.innerText = "Yapay Zeka Düşünüyor...";
            btn.disabled = true;
            steps.innerHTML += `<div class="step-active">🚀 Talimat alındı: ${input}</div>`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input, history: chatHistory })
                });
                const data = await response.json();

                if(data.success) {
                    parseAIResponse(data.aiResponse);
                    chatHistory.push({ role: "user", content: input });
                    chatHistory.push({ role: "assistant", content: data.aiResponse });
                }
            } catch (err) {
                alert("Hata: " + err.message);
            } finally {
                btn.disabled = false;
                status.innerText = "Proje Hazır!";
            }
        }

        function parseAIResponse(text) {
            const fileRegex = /\[FILE: (.*?)\]([\s\S]*?)\[END_FILE\]/g;
            let match;
            const steps = document.getElementById('steps');

            while ((match = fileRegex.exec(text)) !== null) {
                const fileName = match[1];
                const fileContent = match[2].trim();
                projectFiles[fileName] = fileContent;
                steps.innerHTML += `<div class="text-emerald-400 text-xs">✅ Dosya oluşturuldu: ${fileName}</div>`;
            }
            document.getElementById('codeView').innerText = text;
            updatePreview();
        }

        function updatePreview() {
            const frame = document.getElementById('previewFrame');
            // Sadece HTML dosyasını temel alarak önizleme yapar
            const htmlContent = projectFiles['index.html'] || "<h1>Henüz index.html yok</h1>";
            frame.srcdoc = htmlContent;
        }

        function togglePreview() {
            document.getElementById('fullPreview').classList.toggle('hidden');
        }

        async function downloadZip() {
            const zip = new JSZip();
            for(let name in projectFiles) {
                zip.file(name, projectFiles[name]);
            }
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "vibe_project.zip";
            a.click();
        }
    </script>
</body>
</html>
