<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniVibe Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .mobile-scroll { -webkit-overflow-scrolling: touch; }
        textarea { font-size: 16px !important; } /* Mobilde zoom yapmasın diye */
    </style>
</head>
<body class="h-screen flex flex-col p-2">
    <header class="flex flex-wrap gap-2 justify-between items-center mb-2 border-b border-zinc-800 pb-2">
        <h1 class="text-sm font-bold text-emerald-400">OMNIVIBE v2</h1>
        <div class="flex gap-1">
            <button onclick="togglePreview()" class="bg-zinc-800 text-[10px] px-2 py-1 rounded">ÖNİZLE</button>
            <button onclick="downloadZip()" class="bg-emerald-600 text-black text-[10px] px-2 py-1 rounded font-bold">ZIP</button>
        </div>
    </header>

    <div id="steps" class="flex-1 overflow-y-auto mb-2 text-[10px] space-y-1 mobile-scroll">
        <div class="text-zinc-500 italic">Kanka vibe'ını aşağıya yaz...</div>
    </div>

    <div class="flex flex-col gap-2 shrink-0">
        <textarea id="userInput" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-xs" rows="3" placeholder="Örn: Modern bir hesap makinesi..."></textarea>
        <button onclick="sendVibe()" id="sendBtn" class="w-full bg-emerald-500 text-black font-bold py-2 rounded text-sm uppercase">KODLA 🚀</button>
    </div>

    <div id="fullPreview" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="p-2 flex justify-between bg-zinc-900 border-b border-emerald-500">
            <span class="text-xs font-bold">ÖNİZLEME</span>
            <button onclick="togglePreview()" class="text-red-500 text-xs">KAPAT</button>
        </div>
        <iframe id="previewFrame" class="w-full flex-1 bg-white"></iframe>
    </div>

    <script>
        let projectFiles = {};
        async function sendVibe() {
            const input = document.getElementById('userInput').value;
            if(!input) return;
            document.getElementById('sendBtn').innerText = "BEKLE...";
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input, history: [] })
                });
                const data = await response.json();
                if(data.success) parseFiles(data.aiResponse);
            } catch (e) { alert("Hata!"); }
            document.getElementById('sendBtn').innerText = "KODLA 🚀";
        }

        function parseFiles(text) {
            const regex = /\[FILE:\s*(.+?)\]([\s\S]*?)\[END_FILE\]/gi;
            let m;
            while ((m = regex.exec(text)) !== null) {
                projectFiles[m[1].trim()] = m[2].trim();
                document.getElementById('steps').innerHTML += `<div class="text-emerald-400">✅ ${m[1].trim()}</div>`;
            }
            if(projectFiles['index.html']) document.getElementById('previewFrame').srcdoc = projectFiles['index.html'];
        }
        function togglePreview() { document.getElementById('fullPreview').classList.toggle('hidden'); }
        async function downloadZip() {
            const zip = new JSZip();
            for(let n in projectFiles) zip.file(n, projectFiles[n]);
            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "proje.zip";
            a.click();
        }
    </script>
</body>
</html>
